# .github/workflows/fpl-daily.yml
# Automated daily FPL Tracker update

name: FPL Daily Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run FPL Tracker
        run: python run.py --output output

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/ || true
          git diff --staged --quiet || git commit -m "FPL data update $(date +'%Y-%m-%d %H:%M UTC')"
          git push || true